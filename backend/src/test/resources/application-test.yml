spring:
  datasource:
    url: jdbc:h2:mem:taskmanager-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false

app:
  cors:
    allowed-origins: http://localhost:3000
  seed:
    enabled: false
