spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/taskmanager}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
  mvc:
    problemdetails:
      enabled: true

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:VGhpc0lzQVN0cm9uZ0Vub3VnaFNlY3JldEtleUZvcldlZWs4VGFza01hbmFnZXI=}
    access-token-expiration-ms: 900000
    refresh-token-expiration-ms: 604800000
  cors:
    allowed-origins: ${FRONTEND_URL:http://localhost:3000},http://localhost:5173

springdoc:
  swagger-ui:
    path: /swagger-ui.html
